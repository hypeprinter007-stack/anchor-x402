<script>
// Inline pre-script: captures uncaught errors even if the module fails.
(function () {
  function append(msg, cls) {
    var d = document.getElementById("diag");
    if (!d) return;
    if (location.search.indexOf("debug=1") < 0 && cls !== "err") return;
    d.style.display = "block";
    if (cls) d.classList.add(cls);
    var line = document.createElement("div");
    line.textContent = msg;
    d.appendChild(line);
  }
  window.__diag = append;
  window.addEventListener("error", function (e) {
    append("[js-err] " + (e.message || "?") + " @ " + (e.filename || "?") + ":" + (e.lineno || "?"), "err");
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = e && e.reason;
    append("[rej] " + (r && (r.message || r.toString()) || "unknown"), "err");
  });
  window.addEventListener("DOMContentLoaded", function () {
    setTimeout(function () {
      if (!window.__moduleLoaded) append("[boot] module did NOT execute — ESM imports failed", "err");
    }, 3000);
  });
})();
</script>

  const div = document.createElement("div");
  div.className = "msg " + role;
  const who = role === "agent" ? "agent" : role === "user" ? "you" : role === "tool" ? "tool" : "system";
  div.innerHTML = `<div class="who">${who}</div><div class="body"></div>`;
  const b = div.querySelector(".body");
  if (typeof body === "string") b.textContent = body;
  else b.appendChild(body);
  chatEl.appendChild(div);
  scrollToEnd();
  return div;

}

// ====================== slash commands ======================
function tryHandleSlashCommand(text) {
  const t = text.trim().toLowerCase();
  if (t === "/help") {
    appendMsg("user", text);
    showHelp();
    return true;
  }
  if (t === "/services") {
    appendMsg("user", text);
    showServices();
    return true;
  }
  if (t.startsWith("/demo")) {
    const parts = text.trim().split(/\s+/);
    const key = (parts[1] || "").toLowerCase();
    appendMsg("user", text);
    if (!key || !DEMOS[key]) {
      const names = Object.keys(DEMOS).join(", ");
      appendMsg("sys", `Try: /demo ${names}`);
    } else {
      playDemo(key);
    }
    return true;
  }
  return false;
}

function showHelp() {
  const lines = [
    "Type anything in natural language — I'll figure out which paid tool runs it.",
    "",
    "Commands:",
    "  /services         list all 15 services and prices",
    "  /demo <name>      see a free demo (no payment): aura, roast, oracle, tldr, screen, grade",
    "",
    "How payment works:",
    "  1. Type your request. I respond and quote the tool's price.",
    "  2. Tap Approve. Your wallet signs an EIP-3009 USDC authorization for that exact call.",
    "  3. I run the tool and show you the result.",
    "  4. Nothing is custodial. Nothing is auto-charged. Each call signs separately.",
    "",
    "Connect a wallet:",
    "  Tap 'connect' (top right). Choose passkey (no app) or your browser-extension wallet.",
    "  Treasury (where payments go): 0x127462e296fAc1A7F5cF33bA57bB2f0FFf5cD0B6",
  ].join("\n");
  appendMsg("agent", lines);
}

function showServices() {
  const lines = ALL_SERVICES.map((s) =>
    `  ${s.name.padEnd(18, " ")}  $${s.price.toFixed(3).padStart(6, " ")}   ${s.what}`
  ).join("\n");
  const node = document.createElement("pre");
  node.className = "mono";
  node.style.cssText = "margin: 0; white-space: pre-wrap; font-size: 12.5px;";
  node.textContent = lines;
  appendMsg("agent", node);
}

function playDemo(key) {
  const d = DEMOS[key];
  if (!d) return;
  // Show as if user typed it
  appendMsg("user", d.input + "    (demo)");
  const result = document.createElement("div");
  result.className = "result";
  result.innerHTML = `<div class="head"><span>${key} · demo · ${d.price}</span><span class="ok">no payment</span></div><pre></pre>`;
  result.querySelector("pre").textContent = JSON.stringify(d.output, null, 2);
  appendNode(result);
  appendMsg("sys", `That's what ${key} returns. Type your own to run it for real (${d.price}).`);
}

// ====================== chat with /v1/chat ======================
function sendUserMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  if (text.length > 4000) { toast("Message too long (4000 max)", "err"); return; }
  inputEl.value = "";
  inputEl.style.height = "auto";

  if (tryHandleSlashCommand(text)) return;

  appendMsg("user", text);
  state.conversation.push({ role: "user", content: text });
  runTurns().catch((e) => toast(e.message || String(e), "err"));
}

async function runTurns() {
  for (let i = 0; i < TURN_SAFETY_CAP; i++) {
    let turn;
    try { turn = await chatTurn(state.conversation); }
    catch (e) { appendMsg("sys", "Chat error: " + e.message); return; }

    if (turn.assistant_text) appendMsg("agent", turn.assistant_text);

    const assistantContent = [];
    if (turn.assistant_text) assistantContent.push({ type: "text", text: turn.assistant_text });
    if (turn.tool_uses) for (const tu of turn.tool_uses) assistantContent.push({ type: "tool_use", id: tu.id, name: tu.name, input: tu.input });
    if (assistantContent.length) state.conversation.push({ role: "assistant", content: assistantContent });

    if (!turn.tool_uses) return;

    const results = [];
    for (const tu of turn.tool_uses) {
      const r = await renderApprovalAndRun(tu);
      results.push({ type: "tool_result", tool_use_id: tu.id, content: JSON.stringify(r) });
    }
    state.conversation.push({ role: "user", content: results });
  }
  appendMsg("sys", `Safety cap of ${TURN_SAFETY_CAP} turns reached.`);
}

async function chatTurn(messages) {
  const r = await fetch("/v1/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages }) });
  if (r.status === 400) { const j = await r.json().catch(() => ({})); throw new Error(j.detail || "Bad request"); }
  if (!r.ok) throw new Error("Chat backend: HTTP " + r.status);
  return await r.json();
}

// ====================== approvals + execute ======================
const TOOL_ROUTES = {
  anchor_hash:        { method: "POST", path: "/v1/anchor",          price: 0.005 },
  screen_wallet:      { method: "GET",  path: "/v1/screen",          price: 0.001, query: ["wallet"] },
  attest_decision:    { method: "POST", path: "/v1/attest",          price: 0.010 },
  decode_tx:          { method: "POST", path: "/v1/decode/tx",       price: 0.001 },
  decode_calldata:    { method: "POST", path: "/v1/decode/calldata", price: 0.001 },
  resolve_name:       { method: "GET",  path: "/v1/resolve/name",    price: 0.001, query: ["name"] },
  token_price:        { method: "GET",  path: "/v1/price/token",     price: 0.001, query: ["symbol"] },
  parse_datetime:     { method: "POST", path: "/v1/parse/datetime",  price: 0.001 },
  wallet_intel:       { method: "GET",  path: "/v1/intel/wallet",    price: 0.005, query: ["wallet"] },
  investigate_wallet: { method: "POST", path: "/v1/investigate",     price: 7.770, async: true },
  roast:              { method: "POST", path: "/v1/roast",           price: 0.050 },
  oracle:             { method: "POST", path: "/v1/oracle",          price: 0.050 },
  tldr:               { method: "POST", path: "/v1/tldr",            price: 0.010 },
  aura:               { method: "POST", path: "/v1/aura",            price: 0.010 },
  grade:              { method: "POST", path: "/v1/grade",           price: 0.010 },
};

function prettyInput(input) {
  if (!input || typeof input !== "object") return String(input ?? "");
  const keys = Object.keys(input);
  if (keys.length === 1) return String(input[keys[0]]);
  return keys.map((k) => `${k}: ${input[k]}`).join("\n");
}

function renderApprovalAndRun(tu) {
  return new Promise((resolve) => {
    const route = TOOL_ROUTES[tu.name];
    const price = route?.price ?? tu.price_usd ?? 0;

    const card = document.createElement("div");
    card.className = "approval";
    card.innerHTML = `
      <h3>Run <strong>${tu.name}</strong> · <span class="price">$${price.toFixed(3)} USDC</span></h3>
      <div style="color: var(--muted); font-size: 12px;" class="mono">${route ? route.method + " " + route.path : "unknown tool"}</div>
      <pre></pre>
      <div class="actions"></div>
    `;
    card.querySelector("pre").textContent = prettyInput(tu.input);
    const actions = card.querySelector(".actions");

    const finish = (resObj) => {
      Array.from(actions.querySelectorAll("button")).forEach((b) => (b.disabled = true));
      resolve(resObj);
    };

    const runBtn = document.createElement("button");
    runBtn.className = "btn primary";
    runBtn.textContent = state.account ? `approve $${price.toFixed(3)}` : `connect & approve $${price.toFixed(3)}`;
    runBtn.addEventListener("click", async () => {
      try {
        if (!state.account) {
          runBtn.disabled = true; runBtn.textContent = "connecting…";
          await connectCoinbase();
          runBtn.textContent = `approving $${price.toFixed(3)}…`;
        }
        if (!route) throw new Error("unknown tool: " + tu.name);
        if (state.sessionSpend + price > state.sessionCap + 1e-9) {
          const ok = window.confirm(`This call would exceed your session cap ($${state.sessionCap.toFixed(2)}). Raise it?`);
          if (!ok) { finish({ skipped: true, reason: "cap exceeded" }); return; }
          state.sessionCap = state.sessionSpend + price + 1;
        }
        runBtn.disabled = true; runBtn.textContent = "running…";
        const out = await executeTool(tu.name, route, tu.input);
        state.sessionSpend += price; renderPill();
        renderResult(tu.name, out, false);
        finish(out);
      } catch (e) {
        const err = { error: String(e?.message || e) };
        renderResult(tu.name, err, true);
        finish(err);
      }
    });

    const skipBtn = document.createElement("button");
    skipBtn.className = "btn ghost sm";
    skipBtn.textContent = "skip";
    skipBtn.addEventListener("click", () => { renderResult(tu.name, { skipped: true }, false, "skipped"); finish({ skipped: true }); });

    const row = document.createElement("div"); row.className = "row";
    row.appendChild(runBtn); row.appendChild(skipBtn);
    actions.appendChild(row);

    if (!state.account) {
      const injectedName = detectInjectedName();
      if (injectedName) {
        const injBtn = document.createElement("button");
        injBtn.className = "btn sm ghost";
        injBtn.textContent = `use ${injectedName} instead`;
        injBtn.addEventListener("click", async () => {
          if (injBtn.disabled) return;
          injBtn.disabled = true; injBtn.textContent = "connecting…";
          try { await connectInjected(); runBtn.click(); }
          catch (e) { toast(e.message || String(e), "err"); injBtn.disabled = false; injBtn.textContent = `use ${injectedName} instead`; }
        });
        const row2 = document.createElement("div"); row2.className = "row";
        row2.appendChild(injBtn);
        actions.appendChild(row2);
      }
      const topup = document.createElement("div");
      topup.style.cssText = "color: var(--muted); font-size: 12px; margin-top: 8px;";
      topup.innerHTML = `Need USDC on Base? <a href="https://pay.coinbase.com" target="_blank" rel="noopener">Coinbase</a> · <a href="https://www.moonpay.com/buy/usdc" target="_blank" rel="noopener">MoonPay</a>`;
      actions.appendChild(topup);
    }

    appendNode(card);
  });
}

function renderResult(name, obj, isErr, label) {
  const div = document.createElement("div");
  div.className = "result" + (isErr ? " err" : "");
  div.innerHTML = `<div class="head"><span>${name}</span><span class="${isErr ? "bad" : "ok"}">${label || (isErr ? "error" : "ok")}</span></div><pre></pre>`;
  div.querySelector("pre").textContent = JSON.stringify(obj, null, 2);
  appendNode(div);
}

async function executeTool(name, route, input) {
  if (!state.paidFetch) throw new Error("Wallet not connected — tap connect first.");
  const url = buildUrl(route, input);
  const init = { method: route.method, headers: { "Content-Type": "application/json" } };
  if (route.method !== "GET") init.body = JSON.stringify(input);
  try {
    const r = await state.paidFetch(url, init);
    if (!r.ok) {
      let body = ""; try { body = await r.text(); } catch {}
      const truncated = body.length > 400 ? body.slice(0, 400) + "…" : body;
      throw new Error(`HTTP ${r.status}: ${truncated || r.statusText}`);
    }
    const data = await r.json();
    if (route.async && data.job_id && data.status_url) return await pollInvestigate(data.status_url, data.job_id);
    return data;
  } catch (e) {
    const msg = String(e?.message || e);
    if (window.__diag) window.__diag(`[paid-call] ${e?.name || "Error"}: ${msg}`, "err");
    if (msg.includes("rejected") || msg.includes("denied") || msg.includes("User denied")) {
      throw new Error("You declined the signature in your wallet.");
    }
    throw e;
  }
}

function buildUrl(route, input) {
  if (!route.query || !route.query.length) return route.path;
  const params = new URLSearchParams();
  for (const k of route.query) if (input[k] != null) params.set(k, input[k]);
  const qs = params.toString();
  return qs ? `${route.path}?${qs}` : route.path;
}

async function pollInvestigate(statusUrl, jobId) {
  appendMsg("sys", `investigate started — job_id ${jobId}. Polling every 30s, up to ~15 min…`);
  const url = statusUrl.startsWith("http") ? statusUrl : statusUrl;
  for (let i = 0; i < INVESTIGATE_MAX_POLLS; i++) {
    await new Promise((res) => setTimeout(res, INVESTIGATE_POLL_MS));
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      const j = await r.json();
      if (j.status === "DELIVERED" || j.status === "FAILED") return j;
    } catch {}
  }
  return { job_id: jobId, status: "TIMEOUT", note: "client polling stopped — check status_url later" };
}

// ====================== wallet ======================
const BASE_CHAIN_ID_HEX = "0x2105";

function detectInjectedName() {
  const e = window.ethereum;
  if (!e) return null;
  if (e.isMetaMask) return "MetaMask";
  if (e.isRabby) return "Rabby";
  if (e.isCoinbaseWallet) return "Coinbase Wallet";
  if (e.isBraveWallet) return "Brave Wallet";
  if (e.isFrame) return "Frame";
  if (e.isTrust) return "Trust";
  return "browser wallet";
}

async function ensureBaseChain(provider) {
  try {
    await provider.request({ method: "wallet_switchEthereumChain", params: [{ chainId: BASE_CHAIN_ID_HEX }] });
  } catch (e) {
    if (e?.code === 4902) {
      await provider.request({
        method: "wallet_addEthereumChain",
        params: [{ chainId: BASE_CHAIN_ID_HEX, chainName: "Base", rpcUrls: ["https://mainnet.base.org"],
                   nativeCurrency: { name: "Ether", symbol: "ETH", decimals: 18 },
                   blockExplorerUrls: ["https://basescan.org"] }],
      });
    } else { throw e; }
  }
}

function buildPaidFetch(provider, address) {
  const walletClient = createWalletClient({ account: address, chain: base, transport: custom(provider) });
  const signer = { address, signTypedData: (msg) => walletClient.signTypedData(msg) };
  return wrapFetchWithPaymentFromConfig(fetch, {
    schemes: [{ network: "eip155:8453", client: new ExactEvmScheme(signer) }],
  });
}

function wireProviderLifecycle(provider, methodName) {
  provider.on?.("accountsChanged", (accts) => { if (!accts || !accts.length) resetWalletState(`${methodName} disconnected.`); });
  provider.on?.("disconnect", () => resetWalletState(`${methodName} disconnected.`));
}

function resetWalletState(reason) {
  state.account = null; state.paidFetch = null;
  renderPill();
  if (reason) appendMsg("sys", reason);
}

async function connectCoinbase() {
  if (state.account) return;
  const sdk = new CoinbaseWalletSDK({ appName: "anchor-x402 agent", appChainIds: [8453] });
  state.cbProvider = sdk.makeWeb3Provider({ options: "smartWalletOnly" });
  state.connectMethod = "coinbase";

  const accounts = await state.cbProvider.request({ method: "eth_requestAccounts" });
  state.account = accounts && accounts[0];
  if (!state.account) throw new Error("Coinbase Smart Wallet didn't return an account.");

  state.paidFetch = buildPaidFetch(state.cbProvider, state.account);
  renderPill();
  appendMsg("sys", `Connected with passkey. Cap: $${state.sessionCap.toFixed(2)}/session.`);
  wireProviderLifecycle(state.cbProvider, "Coinbase Smart Wallet");
}

async function connectInjected() {
  if (state.account) return;
  if (!window.ethereum) throw new Error("No browser-extension wallet detected.");
  const provider = window.ethereum;
  state.injectedProvider = provider;
  state.connectMethod = "injected";

  const accounts = await provider.request({ method: "eth_requestAccounts" });
  state.account = accounts && accounts[0];
  if (!state.account) throw new Error("No account returned from your wallet.");

  await ensureBaseChain(provider);
  state.paidFetch = buildPaidFetch(provider, state.account);
  renderPill();
  appendMsg("sys", `Connected ${detectInjectedName()}. Cap: $${state.sessionCap.toFixed(2)}/session.`);
  wireProviderLifecycle(provider, detectInjectedName() || "Wallet");
}

async function connectChoice() {
  // Default to passkey. If user wants injected, they can use the inline button
  // on approval cards, or this UI gives them a single-shot fallback via confirm.
  const injName = detectInjectedName();
  if (injName && confirm(`Connect with passkey (recommended)?\n\nClick OK for passkey, Cancel to use ${injName} instead.`)) {
    await connectCoinbase();
  } else if (injName) {
    await connectInjected();
  } else {
    await connectCoinbase();
  }
}

// ====================== bootstrap ======================
(async function init() {
  // Send button
  $("send-btn").addEventListener("click", sendUserMessage);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendUserMessage(); }
  });
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // Connect pill
  $("connect-pill").addEventListener("click", async () => {
    if (state.account) {
      if (confirm("Disconnect?")) {
        try { await state.cbProvider?.disconnect?.(); } catch {}
        state.cbProvider = null; state.injectedProvider = null;
        resetWalletState("Signed out.");
      }
    } else {
      try { await connectChoice(); }
      catch (e) { toast(e.message || String(e), "err"); }
    }
  });

  // Greeting
  bootGreeting();
  renderPill();

  // Rotating placeholder
  rotatePlaceholder();
  setInterval(rotatePlaceholder, 4500);
})();
